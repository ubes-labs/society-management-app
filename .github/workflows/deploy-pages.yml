name: Deploy to Github pages

on:
  push:
    branches:
      - main
    paths:
      - "society-management-ui/**"
      - ".github/workflows/deploy-pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and Deploy ng application
    runs-on: ubuntu-latest

    environment:
      name: github-pages

    steps:
      - name: Checkout Source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: society-management-ui/package-lock.json

      - name: Install npm dependencies
        working-directory: ./society-management-ui
        run: npm ci

      - name: Generate environment.ts
        working-directory: ./society-management-ui
        run: |
          mkdir -p src/environments

          cat > src/environments/environment.ts << EOF
          export const environment = {
            production: true,
            supabaseUrl: '${{ secrets.SUPABASE_URL }}',
            supabaseAnonKey: '${{ secrets.SUPABASE_ANON_KEY }}'
          };
          EOF

      - name: Verify environment file exists
        working-directory: ./society-management-ui
        run: |
          ls -la src/environments

      - name: Execute Unit tests
        working-directory: ./society-management-ui
        run: npm run test --watch=false --browsers=ChromeHeadless

      - name: Build ng application
        working-directory: ./society-management-ui
        env:
          APP_NAME: ${{ github.event.repository.name }}
        run: |
          npm run build -- \
          --configuration production \
          --base-href "/${APP_NAME}/"

      - name: Configure Language landing page
        working-directory: ./society-management-ui
        env:
          APP_NAME: ${{ github.event.repository.name }}
        run: |
          cat > dist/society-management-ui/browser/index.html << EOF
            <!doctype html>
            <html lang="en">
              <head>
                <meta charset="utf-8" />
                <title>Society Management</title>
                <script>
                  const base = '/${APP_NAME}/';
                  const lang = navigator?.language?.toLowerCase() ?? null;
                  if (lang.startsWith('hi')) location.replace(base + 'hi/#/');
                  else if (lang.startsWith('bn')) location.replace(base + 'bn/#/');
                  else location.replace(base + 'en-US/#/');
                </script>
              </head>
              <body></body>
            </html>
            EOF

      - name: Setup Github pages
        uses: actions/configure-pages@v5

      - name: Upload Build Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: society-management-ui/dist/society-management-ui/browser

      - name: Deploy to Github pages
        uses: actions/deploy-pages@v4
