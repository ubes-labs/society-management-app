<mat-toolbar class="mat-toolbar-custom">
  <div class="flex gap-4 items-center">
    <button
      matMiniFab
      aria-label="Open menu"
      i18n-aria-label="@@openMenuAriaLabel"
      (click)="toggleSidenav.emit()"
    >
      <mat-icon>menu</mat-icon>
    </button>
    <img
      src="images/company_logo.png"
      alt="Logo"
      i18n-alt="@@logoAltText"
      class="h-full w-10 object-contain"
    />
    <h1 class="max-sm:!text-lg">{{ appTitle }}</h1>
  </div>
</mat-toolbar>
