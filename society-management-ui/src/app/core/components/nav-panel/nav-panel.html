<div class="container">
  <div class="first-panel">
    <mat-list>
      <mat-list-item>
        @if (auth.user()) {
          <button matButton [matMenuTriggerFor]="profileMenu">
            <mat-icon>{{ navRoutes.login.icon }}</mat-icon
            >User Profile
          </button>
        } @else {
          <a
            matButton
            [routerLink]="navRoutes.login.route"
            (click)="menuItemsClicked.emit()"
            routerLinkActive="active-link"
            ><mat-icon>{{ navRoutes.login.icon }}</mat-icon> {{ navRoutes.login.label }}
          </a>
        }
      </mat-list-item>
      <mat-list-item>
        <button matButton [matMenuTriggerFor]="changeLanguage">
          <mat-icon>language</mat-icon>Change Language
        </button>
      </mat-list-item>
    </mat-list>
  </div>
  <mat-divider></mat-divider>
  <div class="second-panel">
    <mat-nav-list>
      <a
        mat-list-item
        [routerLink]="navRoutes.dashboard.route"
        (click)="menuItemsClicked.emit()"
        routerLinkActive="active-link"
        ><mat-icon matListItemIcon>{{ navRoutes.dashboard.icon }}</mat-icon>
        {{ navRoutes.dashboard.label }}
      </a>
    </mat-nav-list>
  </div>
</div>
<mat-menu #profileMenu>
  <button mat-menu-item (click)="logOut()">
    <mat-icon>logout</mat-icon> {{ navRoutes.logout.label }}
  </button>
</mat-menu>
<mat-menu #changeLanguage>
  @for (language of languages; track $index) {
    <button mat-menu-item (click)="switchLanguage(language.key)">
      {{ language.label }}
    </button>
  }
</mat-menu>
