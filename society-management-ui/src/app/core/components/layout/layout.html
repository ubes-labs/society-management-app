<div class="wrapper">
  <app-top-nav-bar (toggleSidenav)="drawer.toggle()"></app-top-nav-bar>
  <mat-sidenav-container>
    <mat-sidenav [class]="{ 'w-50': isHandset(), 'w-20': !isHandset() }" #drawer mode="over"
      ><app-nav-panel></app-nav-panel
    ></mat-sidenav>
    <mat-sidenav-content class="p-15">
      <main>
        <router-outlet></router-outlet> <mat-divider></mat-divider> <app-footer></app-footer>
      </main>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
