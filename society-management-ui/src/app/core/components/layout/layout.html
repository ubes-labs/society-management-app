<app-loading-spinner></app-loading-spinner>
<div class="flex flex-col h-full overflow-hidden">
  <app-top-nav-bar class="flex-0" (toggleSidenav)="drawer.toggle()"></app-top-nav-bar>
  <mat-sidenav-container class="flex-1 min-h-0">
    <mat-sidenav class="!w-auto overflow-auto" #drawer mode="over" [autoFocus]="false"
      ><app-nav-panel (menuItemsClicked)="drawer.toggle()"></app-nav-panel
    ></mat-sidenav>
    <mat-sidenav-content class="p-4 overflow-auto">
      <main class="flex flex-col gap-4 h-full">
        <router-outlet></router-outlet> <mat-divider></mat-divider> <app-footer></app-footer>
      </main>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
